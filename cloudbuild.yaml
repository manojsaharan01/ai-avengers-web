# ── Google Cloud Build — CI/CD for AI Avengers Web ────────────────────────
# Trigger: push to main branch
# Flow: build → push to Artifact Registry → deploy to Cloud Run
#
# One-time setup:
#   gcloud projects create ai-avengers-web --name="AI Avengers Web"
#   gcloud artifacts repositories create ai-avengers \
#     --repository-format=docker \
#     --location=australia-southeast1 \
#     --description="AI Avengers web images"
#   gcloud run services create ai-avengers-web \
#     --region=australia-southeast1 \
#     --allow-unauthenticated

substitutions:
  _REGION: us-west1
  _REPO: cloud-run-source-deploy
  _SERVICE: ai-avengers-web
  _PROJECT: gen-lang-client-0687906913

steps:
  # ── Build the Docker image ───────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - build
      - '--build-arg=NEXT_PUBLIC_SANITY_PROJECT_ID=pdgjheli'
      - '--build-arg=NEXT_PUBLIC_SANITY_DATASET=production'
      - '--build-arg=NEXT_PUBLIC_SITE_URL=https://aiavengers.io'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:latest'
      - '.'

  # ── Push to Artifact Registry ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    waitFor: ['build']
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}'

  # ── Deploy to Cloud Run ──────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['push']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1'
      - '--project=${_PROJECT}'

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_SERVICE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
